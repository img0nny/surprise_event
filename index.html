<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>깜짝 이벤트 - 반차 뽑기!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; color: white; }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        .comic-font { font-family: 'Jua', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .pop-up { animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 50%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }

        .btn-glow-pink { box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
        .btn-glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        /* 로또 공 3D 애니메이션 스타일 */
        .lottery-ball-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto;
        }
        .lottery-ball {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fcd34d, #b45309);
            box-shadow: inset -15px -15px 25px rgba(0,0,0,0.4), 0 15px 25px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            font-family: 'Black Han Sans', sans-serif;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
            position: relative;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .lottery-ball::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 20%;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: rotate(-45deg);
        }
        /* 요동치는 애니메이션 (돌아갈 때만 적용) */
        .spin-animation {
            animation: spin-ball 0.08s linear infinite;
        }
        @keyframes spin-ball {
            0% { transform: rotate(-3deg) translateY(-2px); }
            50% { transform: rotate(3deg) translateY(2px); }
            100% { transform: rotate(-3deg) translateY(-2px); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="relative">

    <div class="absolute top-4 left-4 flex items-center gap-1 bg-pink-500/20 text-pink-400 px-3 py-1 rounded-full text-[10px] font-bold border border-pink-500/30 shadow-lg z-50">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-pink-500"></span>
        </span>
        LIVE 스페셜 이벤트
    </div>

    <button onclick="window.enterAdminMode()" class="fixed bottom-2 right-2 text-[10px] text-slate-500 bg-slate-800/50 px-2 py-1 rounded opacity-30 hover:opacity-100 z-50 transition-all">
        관리자 모드
    </button>

    <div id="app" class="w-full max-w-md mx-auto p-4 flex-1 flex flex-col pt-12">
        <div class="flex-1 flex justify-center items-center text-slate-400 text-lg font-bold flex-col gap-4 pt-20">
            <div class="text-5xl animate-spin comic-font">🌀</div>
            <p class="animate-pulse text-sm">최종 경기 결과를 동기화 중입니다...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlrDE_xgT6VBwEQ7AtqEkPfIng6tuK38g",
            authDomain: "img0nny.firebaseapp.com",
            projectId: "img0nny",
            storageBucket: "img0nny.firebasestorage.app",
            messagingSenderId: "28395677092",
            appId: "1:28395677092:web:603c15d52699f0fe03cd31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const resultDocRef = doc(db, "bowling_event", "round2_results");
        const surpriseDocRef = doc(db, "bowling_event", "surprise_event");

        window.currentView = null;
        window.playerRanks = {}; 
        window.surpriseData = null; 

        const appDiv = document.getElementById('app');

        onSnapshot(resultDocRef, (docSnap) => {
            if (docSnap.exists() && docSnap.data().isFinal) {
                const teamDetails = docSnap.data().teamDetails;
                let allPlayers = [];
                
                teamDetails.forEach(team => {
                    team.members.forEach(m => allPlayers.push(m));
                });

                allPlayers.sort((a, b) => {
                    if (b.finalScore !== a.finalScore) return b.finalScore - a.finalScore;
                    if (b.score !== a.score) return b.score - a.score;
                    return a.name.localeCompare(b.name);
                });

                let newPlayerRanks = {};
                allPlayers.forEach((p, idx) => {
                    newPlayerRanks[p.name] = { rank: idx + 1, score: p.finalScore };
                });

                window.playerRanks = newPlayerRanks;
            } else {
                window.playerRanks = null; 
            }
            checkStateAndRender();
        });

        onSnapshot(surpriseDocRef, (docSnap) => {
            if (docSnap.exists()) {
                window.surpriseData = docSnap.data();
                
                const serverResetTime = window.surpriseData.lastReset || 0;
                const localResetTime = localStorage.getItem('lastSurpriseReset') || 0;
                
                if (serverResetTime > localResetTime) {
                    localStorage.removeItem('mySurpriseNick');
                    localStorage.setItem('lastSurpriseReset', serverResetTime);
                }
            } else {
                const winNum = Math.floor(Math.random() * 16) + 1;
                setDoc(surpriseDocRef, { winningNumber: winNum, openedBoxes: {}, lastReset: new Date().getTime() });
            }
            checkStateAndRender();
        });

        function checkStateAndRender() {
            if (window.currentView === 'admin') return;

            const myNick = localStorage.getItem('mySurpriseNick');
            
            if (!window.playerRanks) {
                renderWaitScreen();
                return;
            }

            if (!myNick) {
                renderHomeScreen();
                return;
            }

            const myRankData = window.playerRanks[myNick];
            
            // 이미 열어본 기록이 있으면, 바로 결과창으로 넘어갑니다. (애니메이션 스킵 방지용)
            if (window.surpriseData && window.surpriseData.openedBoxes && window.surpriseData.openedBoxes[myRankData.rank] === myNick) {
                const isWinner = window.surpriseData.winningNumber === myRankData.rank;
                if (window.currentView !== 'lottery') {
                    window.renderFinalLotteryView(isWinner, myRankData.rank);
                }
            } 
            else if (window.currentView !== 'lottery') {
                renderGameScreen(myNick, myRankData.rank);
            }
        }

        function renderWaitScreen() {
            window.currentView = 'wait';
            appDiv.innerHTML = `
                <div class="flex-1 flex justify-center items-center text-center fade-in flex-col gap-4">
                    <div class="text-6xl mb-2">⏳</div>
                    <h2 class="text-2xl font-bold text-slate-300 comic-font">아직 최종 결과가 집계되지 않았습니다.</h2>
                    <p class="text-sm text-slate-500">2차전 최종 순위가 발표되면 스페셜 이벤트가 시작됩니다!</p>
                </div>
            `;
        }

        function renderHomeScreen() {
            window.currentView = 'home';
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in">
                    <p class="text-pink-400 font-bold text-lg mb-2 comic-font tracking-widest animate-pulse">마지막 스페셜 이벤트</p>
                    <h1 class="text-4xl md:text-5xl title-font text-white mb-6 leading-tight">
                        자유 반차권<br>행운의 뽑기 🏖️
                    </h1>
                    <p class="text-slate-400 text-sm mb-10 bg-slate-800 px-4 py-2 rounded-lg break-keep border border-slate-700">
                        본인의 <strong class="text-white">최종 개인 등수</strong>가 곧 <strong class="text-pink-400">행운의 번호</strong>가 됩니다!<br>
                        이름을 입력하여 본인의 번호를 확인하세요.
                    </p>
                    
                    <div class="w-full max-w-[280px] mb-6">
                        <input type="text" id="nickInput" placeholder="본인의 닉네임 입력" class="w-full bg-slate-800 border border-slate-600 text-white rounded-xl px-4 py-3 text-center text-xl focus:outline-none focus:border-pink-500 font-black comic-font transition-all shadow-inner">
                    </div>

                    <button onclick="window.loginSurprise()" class="btn-glow-pink bg-gradient-to-r from-pink-500 to-rose-600 text-white font-black py-4 px-12 rounded-full text-xl hover:scale-105 active:scale-95 transition-all shadow-lg">
                        입장하기
                    </button>
                </div>
            `;
        }

        window.loginSurprise = function() {
            const nick = document.getElementById('nickInput').value.trim();
            if (!nick) {
                alert("이름을 입력해주세요!"); return;
            }
            if (!window.playerRanks[nick]) {
                alert(`"${nick}"님은 2차전 최종 명단에 존재하지 않습니다.\n이름을 정확하게 입력했는지 확인해주세요!`); return;
            }

            localStorage.setItem('mySurpriseNick', nick);
            checkStateAndRender(); 
        };

        function renderGameScreen(myNick, myRank) {
            window.currentView = 'game';
            
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in pb-10 w-full">
                    <p class="text-pink-400 font-bold mb-2 comic-font text-lg tracking-widest">환영합니다!</p>
                    <h2 class="text-3xl md:text-4xl title-font text-white mb-8">행운의 번호 확인</h2>
                    
                    <div class="bg-slate-800 border border-slate-600 rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl mb-10">
                        <div class="flex justify-between items-center bg-slate-900/80 p-4 rounded-xl mb-3 border border-slate-700/50">
                            <span class="text-slate-400 font-bold">최종 개인 등수</span>
                            <span class="text-2xl font-black text-white">${myRank}위</span>
                        </div>
                        <div class="flex justify-between items-center bg-slate-900/80 p-4 rounded-xl border border-slate-700/50">
                            <span class="text-slate-400 font-bold">나의 추첨 번호</span>
                            <span class="text-4xl font-black text-pink-400 comic-font">${myRank}번</span>
                        </div>
                    </div>

                    <button onclick="window.startLotteryDraw(${myRank})" class="btn-glow-blue bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-black py-5 px-12 rounded-full text-2xl hover:scale-105 active:scale-95 transition-all w-full md:w-auto shadow-2xl flex items-center justify-center gap-3">
                        <span>🎰</span> 행운의 번호 굴리기!
                    </button>
                    <p class="text-slate-500 text-sm mt-4 font-bold break-keep">버튼을 누르면 화려한 추첨이 시작됩니다.</p>
                </div>
            `;
        }

        // 🎰 애니메이션: 초고속 -> 서서히 느려짐 -> 물음표(?) 정지 -> 결과 확인 버튼
        window.startLotteryDraw = async function(myRank) {
            window.currentView = 'lottery';
            const myNick = localStorage.getItem('mySurpriseNick');

            // 1. 추첨 애니메이션 화면으로 교체
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in pb-10 w-full">
                    <h2 class="text-2xl title-font text-white mb-12 animate-pulse text-pink-400 tracking-widest" id="lotteryTitle">행운의 번호 섞는 중...</h2>
                    
                    <div class="lottery-ball-container mb-12 spin-animation" id="ballWrapper">
                        <div class="lottery-ball" id="lotteryBall">?</div>
                    </div>
                    
                    <!-- 결과 버튼이 나타날 자리 -->
                    <div id="lotteryResultArea" class="flex flex-col items-center justify-center w-full min-h-[160px]">
                        <p class="text-slate-300 text-2xl comic-font animate-pulse" id="lotteryText">두근두근...</p>
                    </div>
                </div>
            `;

            const ball = document.getElementById('lotteryBall');
            const text = document.getElementById('lotteryText');
            
            // 2. 초기 초고속 회전 (0.05초 간격으로 무작위 숫자 롤링)
            let fastSpin = setInterval(() => {
                ball.innerText = Math.floor(Math.random() * 16) + 1;
            }, 50);

            try {
                // 3. 서버에서 당첨 여부 조회 (결과는 isWinner에 담아둠)
                const isWinner = await runTransaction(db, async (transaction) => {
                    const sfDoc = await transaction.get(surpriseDocRef);
                    let data = sfDoc.data();
                    let opened = data.openedBoxes || {};

                    if (opened[myRank]) throw "ALREADY_OPENED";
                    opened[myRank] = myNick;
                    transaction.update(surpriseDocRef, { openedBoxes: opened });

                    return data.winningNumber === myRank;
                });

                // 4. [핵심] 초고속 회전을 잠시(1초) 감상한 후, 서서히 느려지는 쪼는 맛 발동
                setTimeout(() => {
                    clearInterval(fastSpin);
                    
                    let currentDelay = 50;
                    let steps = 0;
                    const maxSteps = 12; // 서서히 늦추는 횟수
                    
                    if (text) text.innerText = "번호가 좁혀집니다...!";

                    const slowDownSpin = () => {
                        steps++;
                        if (steps < maxSteps) {
                            ball.innerText = Math.floor(Math.random() * 16) + 1;
                            currentDelay += 40; // 딜레이를 점점 늘려 공이 느려지게 만듦
                            setTimeout(slowDownSpin, currentDelay);
                        } else {
                            // 완전히 멈출 때 물음표(?)로 세팅!
                            ball.innerText = '?';
                            
                            const title = document.getElementById('lotteryTitle');
                            if (title) {
                                title.innerText = "추첨 완료!";
                                title.classList.remove('animate-pulse', 'text-pink-400');
                                title.classList.add('text-yellow-400', 'pop-up');
                            }

                            const ballWrapper = document.getElementById('ballWrapper');
                            if (ballWrapper) {
                                ballWrapper.classList.remove('spin-animation'); // 흔들림 애니메이션 제거
                                ball.style.transform = "scale(1.1)";
                                setTimeout(() => { ball.style.transform = "scale(1)"; }, 200);
                            }

                            // 물음표 아래에 [결과 확인하기] 버튼 등장
                            const resultArea = document.getElementById('lotteryResultArea');
                            if (resultArea) {
                                resultArea.innerHTML = `
                                    <button onclick="window.renderFinalLotteryView(${isWinner}, ${myRank})" class="btn-glow-pink bg-gradient-to-r from-pink-500 to-rose-600 text-white font-black py-4 px-10 rounded-full text-2xl hover:scale-105 active:scale-95 transition-all shadow-2xl pop-up flex items-center justify-center gap-3 w-full max-w-[280px]">
                                        <span>🎁</span> 결과 확인하기!
                                    </button>
                                    <p class="text-slate-400 text-sm mt-4 fade-in font-bold">버튼을 눌러 당첨 여부를 확인하세요.</p>
                                `;
                            }
                        }
                    };
                    
                    slowDownSpin();

                }, 1000); 

            } catch (e) {
                clearInterval(fastSpin);
                if (e === "ALREADY_OPENED") {
                    alert("이미 추첨 버튼을 누르셨습니다! 기존 결과를 불러옵니다.");
                    const isWinnerData = window.surpriseData.winningNumber === myRank;
                    window.renderFinalLotteryView(isWinnerData, myRank); // 애니메이션 건너뛰고 결과창 렌더링
                } else {
                    alert("통신 오류가 발생했습니다. 다시 시도해 주세요.");
                    window.currentView = null;
                    checkStateAndRender();
                }
            }
        };

        // 🎉 버튼을 누르면 완전히 다른 페이지(결과창)로 넘어가서 발표
        window.renderFinalLotteryView = function(isWinner, myRank) {
            window.currentView = 'result';
            
            let resultCardHTML = '';
            
            if (isWinner) {
                resultCardHTML = `
                    <div class="bg-pink-500/20 border-2 border-pink-400 p-8 rounded-3xl w-full max-w-sm pop-up shadow-[0_0_50px_rgba(236,72,153,0.6)]">
                        <div class="text-6xl mb-4 animate-bounce">🏖️</div>
                        <h3 class="text-4xl font-black text-pink-400 comic-font mb-2">반차 당첨!!</h3>
                        <p class="text-white text-sm font-bold">기획자에게 화면을 보여주시고 마음껏 환호하세요!</p>
                    </div>
                `;
            } else {
                resultCardHTML = `
                    <div class="bg-slate-800 border-2 border-slate-600 p-8 rounded-3xl w-full max-w-sm pop-up shadow-xl">
                        <div class="text-6xl mb-4 grayscale opacity-80 shake">💥</div>
                        <h3 class="text-3xl font-black text-slate-400 comic-font mb-2">꽝! 아쉽습니다</h3>
                        <p class="text-slate-500 text-sm font-bold break-keep">행운의 여신이 이번엔 비껴갔습니다.<br>내일도 힘차게 출근해 주세요!</p>
                    </div>
                `;
            }

            // 페이지 전체를 덮어씌워 완전히 새로운 화면(다음 페이지)으로 이동하는 연출
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in pb-10 w-full">
                    <p class="text-pink-400 font-bold mb-2 comic-font text-lg tracking-widest pop-up">나의 추첨 번호 : [ ${myRank}번 ]</p>
                    <h2 class="text-4xl title-font text-white mb-10 pop-up">최종 결과</h2>
                    
                    <div class="flex flex-col items-center justify-center w-full">
                        ${resultCardHTML}
                    </div>
                    
                    <button onclick="window.currentView=null; checkStateAndRender();" class="mt-12 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 px-8 rounded-full border border-slate-600 transition-all text-sm">
                        처음 화면으로
                    </button>
                </div>
            `;
        };

        // ==========================================
        // 🛠️ 관리자 로직
        // ==========================================
        window.enterAdminMode = function() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "0000") window.renderAdminScreen();
            else if (pw !== null) alert("비밀번호 불일치");
        };

        window.renderAdminScreen = function() {
            window.currentView = 'admin';
            
            const winNum = window.surpriseData ? window.surpriseData.winningNumber : '?';
            const opened = window.surpriseData ? (window.surpriseData.openedBoxes || {}) : {};
            
            let listHTML = '';
            for(let i=1; i<=16; i++) {
                if(opened[i]) {
                    listHTML += `<div class="flex justify-between bg-slate-800 px-3 py-2 border-b border-slate-700 text-sm"><span class="text-slate-400">${i}번 추첨자</span> <span class="${i === winNum ? 'text-pink-400 font-bold' : 'text-white'}">${opened[i]} ${i === winNum ? '(🎉당첨)' : ''}</span></div>`;
                }
            }

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col w-full fade-in pb-10">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl title-font text-white">⚙️ 스페셜 이벤트 관리자</h2>
                        <button onclick="window.currentView=null; checkStateAndRender();" class="text-slate-400 text-sm hover:text-white bg-slate-800 px-3 py-1 rounded-full border border-slate-700">닫기 ✖</button>
                    </div>
                    
                    <div class="bg-pink-900/30 border border-pink-500/50 p-4 rounded-xl mb-4 text-center">
                        <p class="text-pink-400 font-bold mb-1">현재 당첨 번호 (비밀 유지!)</p>
                        <p class="text-4xl title-font text-white">${winNum} 번</p>
                    </div>

                    <div class="bg-slate-900 border border-slate-700 rounded-xl mb-6 overflow-hidden">
                        <div class="bg-slate-800 px-3 py-2 font-bold text-sm text-slate-300">직원 추첨 현황</div>
                        <div class="max-h-[30vh] overflow-y-auto no-scrollbar">${listHTML || '<div class="p-3 text-sm text-slate-500 text-center">아직 아무도 추첨하지 않았습니다.</div>'}</div>
                    </div>

                    <button onclick="window.resetSurpriseData()" class="w-full bg-red-500/10 text-red-400 border border-red-500/30 py-4 rounded-xl font-bold hover:bg-red-500 hover:text-white transition-all shadow-lg flex justify-center items-center gap-2">
                        <span>🚨</span> 당첨 번호 초기화 & 다시 섞기
                    </button>
                </div>
            `;
        };

        window.resetSurpriseData = async function() {
            if(confirm("🚨 기존 추첨 기록이 싹 날아가고 새로운 당첨 번호가 무작위로 숨겨집니다. 진행할까요?")) {
                const winNum = Math.floor(Math.random() * 16) + 1;
                await setDoc(surpriseDocRef, { winningNumber: winNum, openedBoxes: {}, lastReset: new Date().getTime() });
                alert("성공적으로 초기화 및 당첨 번호가 재배치되었습니다.");
                window.currentView = null;
                checkStateAndRender();
            }
        };

    </script>
</body>
</html>
