<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>볼링대회 제비뽑기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        .comic-font { font-family: 'Jua', sans-serif; }

        /* 카드 뒤집기 3D 효과 */
        .perspective { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .ticket-container {
            width: 100%;
            height: 120px;
            cursor: pointer;
        }
        .ticket-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        .ticket-container.flipped .ticket-inner {
            transform: rotateY(180deg);
        }
        .ticket-front, .ticket-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* 제비뽑기 앞면 (물음표) */
        .ticket-front {
            background: linear-gradient(135deg, #cbd5e1, #f1f5f9);
            border: 2px dashed #94a3b8;
        }
        .ticket-front:hover {
            background: linear-gradient(135deg, #bae6fd, #e0f2fe);
            border-color: #38bdf8;
            transform: scale(1.02);
            transition: all 0.2s;
        }
        /* 제비뽑기 뒷면 (결과) */
        .ticket-back {
            background: white;
            border: 2px solid #e2e8f0;
            transform: rotateY(180deg);
        }

        /* 빵빠레 효과 */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <div class="max-w-5xl mx-auto">
        <!-- 헤더 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl title-font text-slate-800 mb-3 drop-shadow-sm">
                🎁 두근두근 <span class="text-pink-500">랜덤박스</span>
            </h1>
            <p class="text-slate-500 font-bold">운명의 카드를 직접 선택하세요!</p>
        </div>

        <!-- 박스 리스트 컨테이너 -->
        <div class="space-y-6" id="box-container">
            <!-- JS로 렌더링 됩니다 -->
        </div>

        <!-- 리셋 버튼 -->
        <div class="text-center mt-12">
            <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-colors flex items-center justify-center mx-auto gap-2">
                <span>🔄 처음부터 다시 섞기</span>
            </button>
        </div>
    </div>

    <script>
        // 팀별 상품 세팅 (기획안 기준)
        const prizesData = [
            {
                id: 1,
                title: "🥇 1등 팀 골드 박스",
                iconColor: "text-yellow-500",
                colorClass: "border-yellow-400 bg-yellow-50",
                titleColor: "text-yellow-600",
                prizes: [
                    { name: "올리브영 5만원", icon: "💄", type: "jackpot" },
                    { name: "배달의민족 3만원", icon: "🍗", type: "good" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" }
                ]
            },
            {
                id: 2,
                title: "🥈 2등 팀 실버 박스",
                iconColor: "text-slate-400",
                colorClass: "border-slate-300 bg-slate-50",
                titleColor: "text-slate-600",
                prizes: [
                    { name: "올리브영 3만원", icon: "🌿", type: "good" },
                    { name: "배달의민족 3만원", icon: "🍗", type: "good" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" }
                ]
            },
            {
                id: 3,
                title: "🥉 3등 팀 브론즈 박스",
                iconColor: "text-amber-600",
                colorClass: "border-amber-400 bg-amber-50",
                titleColor: "text-amber-600",
                prizes: [
                    { name: "올리브영 3만원", icon: "🌿", type: "good" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" }
                ]
            },
            {
                id: 4,
                title: "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" class=\"inline-block w-8 h-8 align-text-bottom mr-1 drop-shadow-sm\"><path d=\"M5 2h5l-1 10H4z\" fill=\"#3b82f6\"/><path d=\"M19 2h-5l1 10h5z\" fill=\"#ef4444\"/><circle cx=\"12\" cy=\"15\" r=\"7.5\" fill=\"#10b981\" stroke=\"#059669\" stroke-width=\"1\"/><text x=\"12\" y=\"18\" fill=\"white\" font-size=\"9\" font-family=\"sans-serif\" font-weight=\"bold\" text-anchor=\"middle\">4</text></svg> 4등 팀 그린 박스",
                iconColor: "text-emerald-500",
                colorClass: "border-emerald-400 bg-emerald-50",
                titleColor: "text-emerald-600",
                prizes: [
                    { name: "배달의민족 3만원", icon: "🍗", type: "good" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" },
                    { name: "스타벅스 1만원", icon: "☕", type: "normal" }
                ]
            }
        ];

        // 배열 셔플 함수 (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 결과 타입에 따른 스타일 반환 함수
        function getPrizeStyle(type) {
            if (type === 'jackpot') return 'text-pink-600 bg-pink-50 border-pink-200'; // 대박 (5만원)
            if (type === 'good') return 'text-blue-600 bg-blue-50 border-blue-200'; // 중박 (3만원)
            return 'text-slate-500 bg-slate-50 border-slate-200'; // 스벅 (1만원)
        }

        // 카드 뒤집기 이벤트 핸들러
        function flipTicket(element) {
            if (!element.classList.contains('flipped')) {
                element.classList.add('flipped');
                // 뒤집힐 때 내부 텍스트에 애니메이션 추가
                const backContent = element.querySelector('.ticket-back-content');
                setTimeout(() => {
                    backContent.classList.add('animate-pop');
                    backContent.classList.remove('opacity-0');
                }, 150);
            }
        }

        // 화면 렌더링
        const container = document.getElementById('box-container');

        prizesData.forEach(box => {
            // 박스별 상품 무작위로 섞기
            const shuffledPrizes = shuffleArray([...box.prizes]);
            
            // 박스 컨테이너 HTML
            let boxHTML = `
                <div class="bg-white rounded-2xl p-6 border-2 ${box.colorClass} shadow-sm flex flex-col md:flex-row gap-6 items-center">
                    <!-- 박스 타이틀 영역 -->
                    <div class="w-full md:w-1/4 text-center md:text-left">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-14 h-14 mx-auto md:mx-0 mb-2 drop-shadow-md ${box.iconColor}">
                            <path d="M9.375 3a1.875 1.875 0 0 0 0 3.75h1.875v4.5H3.375A1.875 1.875 0 0 1 1.5 9.375v-.75c0-1.036.84-1.875 1.875-1.875h3.193A3.375 3.375 0 0 1 12 2.753a3.375 3.375 0 0 1 5.432 3.997h3.193c1.035 0 1.875.84 1.875 1.875v.75c0 1.036-.84 1.875-1.875 1.875H12.75v-4.5h1.875a1.875 1.875 0 1 0-1.875-1.875V6.75h-1.5V4.875C11.25 3.839 10.41 3 9.375 3ZM11.25 12.75H3v6.75a2.25 2.25 0 0 0 2.25 2.25h6v-9ZM12.75 12.75v9h6a2.25 2.25 0 0 0 2.25-2.25v-6.75h-8.25Z" />
                        </svg>
                        <h2 class="text-2xl font-black ${box.titleColor} comic-font tracking-wide">${box.title}</h2>
                        <p class="text-sm text-slate-500 mt-1">4명 중 1개씩 선택!</p>
                    </div>
                    
                    <!-- 4개의 제비 영역 -->
                    <div class="w-full md:w-3/4 grid grid-cols-2 md:grid-cols-4 gap-4 perspective">
            `;

            // 섞인 제비 HTML 생성
            shuffledPrizes.forEach((prize, index) => {
                const styleClass = getPrizeStyle(prize.type);
                
                boxHTML += `
                    <div class="ticket-container" onclick="flipTicket(this)">
                        <div class="ticket-inner transform-style-3d">
                            <!-- 앞면 (물음표) -->
                            <div class="ticket-front backface-hidden">
                                <span class="text-3xl text-slate-400 mb-1">❓</span>
                                <span class="font-bold text-slate-500 text-sm">뽑기</span>
                            </div>
                            <!-- 뒷면 (결과) -->
                            <div class="ticket-back backface-hidden border-2 ${styleClass}">
                                <div class="ticket-back-content opacity-0 flex flex-col items-center justify-center text-center p-2">
                                    <span class="text-3xl mb-1">${prize.icon}</span>
                                    <span class="font-bold text-sm leading-tight comic-font tracking-wide">${prize.name}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            boxHTML += `
                    </div>
                </div>
            `;
            
            container.innerHTML += boxHTML;
        });
    </script>
</body>
</html>
