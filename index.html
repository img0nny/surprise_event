<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>깜짝 이벤트!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; color: white; }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        .comic-font { font-family: 'Jua', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .pop-up { animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 50%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }

        .btn-glow-pink { box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
        .btn-glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        /* 로또 공 3D 애니메이션 스타일 */
        .lottery-ball-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto;
        }
        .lottery-ball {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fcd34d, #b45309);
            box-shadow: inset -15px -15px 25px rgba(0,0,0,0.4), 0 15px 25px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            font-family: 'Black Han Sans', sans-serif;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
            position: relative;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .lottery-ball::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 20%;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: rotate(-45deg);
        }
        .spin-animation {
            animation: spin-ball 0.08s linear infinite;
        }
        @keyframes spin-ball {
            0% { transform: rotate(-3deg) translateY(-2px); }
            50% { transform: rotate(3deg) translateY(2px); }
            100% { transform: rotate(-3deg) translateY(-2px); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="relative">

    <div class="absolute top-4 left-4 flex items-center gap-1 bg-pink-500/20 text-pink-400 px-3 py-1 rounded-full text-[10px] font-bold border border-pink-500/30 shadow-lg z-50">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-pink-500"></span>
        </span>
        LIVE 스페셜 이벤트
    </div>

    <button onclick="window.enterAdminMode()" class="fixed bottom-2 right-2 text-[10px] text-slate-500 bg-slate-800/50 px-2 py-1 rounded opacity-30 hover:opacity-100 z-50 transition-all">
        관리자 모드
    </button>

    <div id="app" class="w-full max-w-md mx-auto p-4 flex-1 flex flex-col pt-12">
        <div class="flex-1 flex justify-center items-center text-slate-400 text-lg font-bold flex-col gap-4 pt-20">
            <div class="text-5xl animate-spin comic-font">🌀</div>
            <p class="animate-pulse text-sm">데이터 동기화 중...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlrDE_xgT6VBwEQ7AtqEkPfIng6tuK38g",
            authDomain: "img0nny.firebaseapp.com",
            projectId: "img0nny",
            storageBucket: "img0nny.firebasestorage.app",
            messagingSenderId: "28395677092",
            appId: "1:28395677092:web:603c15d52699f0fe03cd31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const resultDocRef = doc(db, "bowling_event", "round2_results");
        const surpriseDocRef = doc(db, "bowling_event", "surprise_event");
        const prizeDocRef = doc(db, "bowling_event", "prizes");

        window.currentView = null;
        window.playerRanks = {}; 
        window.surpriseData = null; 
        window.mainPrizeWinners = []; // 3번 앱 당첨자 기록

        const appDiv = document.getElementById('app');

        // 1. 2차전 결과 데이터 구독 (순위 및 점수 산정)
        onSnapshot(resultDocRef, (docSnap) => {
            if (docSnap.exists() && docSnap.data().isFinal) {
                const teamDetails = docSnap.data().teamDetails;
                let allPlayers = [];
                teamDetails.forEach(team => {
                    team.members.forEach(m => allPlayers.push(m));
                });

                allPlayers.sort((a, b) => {
                    if (b.finalScore !== a.finalScore) return b.finalScore - a.finalScore;
                    if (b.score !== a.score) return b.score - a.score;
                    return a.name.localeCompare(b.name);
                });

                let newPlayerRanks = {};
                allPlayers.forEach((p, idx) => {
                    newPlayerRanks[p.name] = { 
                        rank: idx + 1, 
                        score: p.finalScore,
                        originalName: p.name
                    };
                });
                window.playerRanks = newPlayerRanks;
            } else {
                window.playerRanks = null; 
            }
            checkStateAndRender();
        });

        // 2. 3번 앱(상품 추첨) 결과 구독
        onSnapshot(prizeDocRef, (docSnap) => {
            if (docSnap.exists()) {
                window.mainPrizeWinners = docSnap.data().winners || [];
            }
        });

        // 3. 이벤트 상태 데이터 구독
        onSnapshot(surpriseDocRef, (docSnap) => {
            if (docSnap.exists()) {
                window.surpriseData = docSnap.data();
                const serverResetTime = window.surpriseData.lastReset || 0;
                const localResetTime = localStorage.getItem('lastSurpriseReset') || 0;
                if (serverResetTime > localResetTime) {
                    localStorage.removeItem('mySurpriseNick');
                    localStorage.setItem('lastSurpriseReset', serverResetTime);
                }
            } else {
                const winNum = Math.floor(Math.random() * 15) + 2; 
                setDoc(surpriseDocRef, { winningNumber: winNum, openedBoxes: {}, lastReset: new Date().getTime() });
            }
            checkStateAndRender();
        });

        function checkStateAndRender() {
            if (window.currentView === 'admin') return;
            const myNick = localStorage.getItem('mySurpriseNick');
            if (!window.playerRanks) { renderWaitScreen(); return; }
            if (!myNick) { renderHomeScreen(); return; }

            const myRankData = window.playerRanks[myNick];
            if (window.surpriseData && window.surpriseData.openedBoxes && window.surpriseData.openedBoxes[myRankData.rank] === myNick) {
                // 당첨 여부 재판정 (결과창 복구용)
                const resultType = getSpecialResult(myNick, myRankData);
                if (window.currentView !== 'lottery') {
                    window.renderFinalLotteryView(resultType, myRankData.rank);
                }
            } 
            else if (window.currentView !== 'lottery') {
                renderGameScreen(myNick, myRankData.rank);
            }
        }

        // 🛡️ [특별 조건 판정기]
        function getSpecialResult(nickname, myRankData) {
            // 1. 1등 무조건 꽝
            if (myRankData.rank === 1) return 'LOSE';

            // 2. 이혜빈 실장님 데이터 찾기
            const leader = window.playerRanks['이혜빈'];
            if (leader) {
                const isSameScore = myRankData.score === leader.score;
                const isOneRankBelow = myRankData.rank === leader.rank + 1;
                
                // 3. 스타벅스 1만원 당첨 여부 확인
                const myMainPrize = window.mainPrizeWinners.find(w => w.nickname === nickname);
                const drawnStarbucks = myMainPrize && myMainPrize.prizeName.includes("스타벅스");

                if ((isSameScore || isOneRankBelow) && drawnStarbucks) {
                    return 'SPECIAL_GIFT';
                }
            }

            // 4. 일반 당첨 판정
            return (window.surpriseData.winningNumber === myRankData.rank) ? 'WIN_LEAVE' : 'LOSE';
        }

        function renderWaitScreen() {
            window.currentView = 'wait';
            appDiv.innerHTML = `
                <div class="flex-1 flex justify-center items-center text-center fade-in flex-col gap-4">
                    <div class="text-6xl mb-2">⏳</div>
                    <h2 class="text-2xl font-bold text-slate-300 comic-font">아직 결과가 집계되지 않았습니다.</h2>
                    <p class="text-sm text-slate-500">2차전 최종 순위 발표 후 입장이 가능합니다.</p>
                </div>
            `;
        }

        function renderHomeScreen() {
            window.currentView = 'home';
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in">
                    <p class="text-pink-400 font-bold text-lg mb-2 comic-font tracking-widest animate-pulse">마지막 행운의 주인공은?</p>
                    <h1 class="text-5xl md:text-6xl title-font text-white mb-6 leading-tight">행운의 뽑기🎳</h1>
                    <p class="text-slate-400 text-sm mb-10 bg-slate-800 px-4 py-3 rounded-xl border border-slate-700 break-keep">
                        본인의 <strong class="text-white">최종 개인 등수</strong>가 곧 <strong class="text-pink-400">행운의 번호</strong>입니다!<br>
                        이름을 입력하여 입장하세요.
                    </p>
                    <div class="w-full max-w-[280px] mb-6">
                        <input type="text" id="nickInput" placeholder="닉네임 입력" class="w-full bg-slate-800 border border-slate-600 text-white rounded-xl px-4 py-3 text-center text-xl focus:outline-none focus:border-pink-500 font-black comic-font transition-all shadow-inner">
                    </div>
                    <button onclick="window.loginSurprise()" class="btn-glow-pink bg-gradient-to-r from-pink-500 to-rose-600 text-white font-black py-4 px-12 rounded-full text-xl hover:scale-105 active:scale-95 transition-all shadow-lg">입장하기</button>
                </div>
            `;
        }

        window.loginSurprise = function() {
            const nick = document.getElementById('nickInput').value.trim();
            if (!nick) { alert("이름을 입력해주세요!"); return; }
            if (!window.playerRanks[nick]) { alert(`"${nick}"님은 최종 명단에 없습니다. 정확히 입력해주세요!`); return; }
            localStorage.setItem('mySurpriseNick', nick);
            checkStateAndRender(); 
        };

        function renderGameScreen(myNick, myRank) {
            window.currentView = 'game';
            const specialMsg = (myRank === 1) ? "MVP의 품격! 행운까지 거머쥘까요?" : "오늘의 운세를 확인해보세요!";
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in pb-10 w-full">
                    <p class="text-pink-400 font-bold mb-2 comic-font text-lg tracking-widest">${specialMsg}</p>
                    <h2 class="text-3xl md:text-4xl title-font text-white mb-8">나의 추첨 정보</h2>
                    <div class="bg-slate-800 border border-slate-600 rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl mb-10">
                        <div class="flex justify-between items-center bg-slate-900/80 p-4 rounded-xl mb-3 border border-slate-700/50"><span class="text-slate-400 font-bold">개인 등수</span><span class="text-2xl font-black text-white">${myRank}위</span></div>
                        <div class="flex justify-between items-center bg-slate-900/80 p-4 rounded-xl border border-slate-700/50"><span class="text-slate-400 font-bold">행운 번호</span><span class="text-4xl font-black text-pink-400 comic-font">${myRank}번</span></div>
                    </div>
                    <button onclick="window.startLotteryDraw(${myRank})" class="btn-glow-blue bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-black py-5 px-12 rounded-full text-2xl hover:scale-105 active:scale-95 transition-all w-full md:w-auto shadow-2xl flex items-center justify-center gap-3"><span>🎰</span> 행운의 번호 굴리기!</button>
                </div>
            `;
        }

        window.startLotteryDraw = async function(myRank) {
            window.currentView = 'lottery';
            const myNick = localStorage.getItem('mySurpriseNick');
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in pb-10 w-full">
                    <h2 class="text-2xl title-font text-white mb-12 animate-pulse text-pink-400 tracking-widest" id="lotteryTitle">행운의 번호 섞는 중...</h2>
                    <div class="lottery-ball-container mb-12 spin-animation" id="ballWrapper"><div class="lottery-ball" id="lotteryBall">?</div></div>
                    <div id="lotteryResultArea" class="flex flex-col items-center justify-center w-full min-h-[160px]"><p class="text-slate-300 text-2xl comic-font animate-pulse" id="lotteryText">두근두근...</p></div>
                </div>
            `;
            const ball = document.getElementById('lotteryBall');
            const text = document.getElementById('lotteryText');
            let shuffleTimer = setInterval(() => { ball.innerText = Math.floor(Math.random() * 15) + 1; }, 60);

            try {
                const resultType = await runTransaction(db, async (transaction) => {
                    const sfDoc = await transaction.get(surpriseDocRef);
                    let data = sfDoc.data();
                    let opened = data.openedBoxes || {};
                    if (opened[myRank]) throw "ALREADY_OPENED";
                    opened[myRank] = myNick;
                    transaction.update(surpriseDocRef, { openedBoxes: opened });
                    return getSpecialResult(myNick, window.playerRanks[myNick]);
                });

                setTimeout(() => {
                    clearInterval(shuffleTimer);
                    let currentDelay = 80;
                    let steps = 0;
                    const slowDownSpin = () => {
                        steps++;
                        if (steps < 15) {
                            ball.innerText = Math.floor(Math.random() * 16) + 1;
                            currentDelay += 45;
                            setTimeout(slowDownSpin, currentDelay);
                        } else {
                            ball.innerText = '?';
                            const title = document.getElementById('lotteryTitle');
                            if (title) { title.innerText = "추첨 완료!"; title.classList.add('text-yellow-400', 'pop-up'); }
                            if (document.getElementById('ballWrapper')) document.getElementById('ballWrapper').classList.remove('spin-animation');
                            const resultArea = document.getElementById('lotteryResultArea');
                            if (resultArea) {
                                resultArea.innerHTML = `<button onclick="window.renderFinalLotteryView('${resultType}', ${myRank})" class="btn-glow-pink bg-gradient-to-r from-pink-500 to-rose-600 text-white font-black py-4 px-10 rounded-full text-2xl hover:scale-105 active:scale-95 transition-all shadow-2xl pop-up flex items-center justify-center gap-3 w-full max-w-[280px]"><span>🎁</span> 결과 확인하기!</button>`;
                            }
                        }
                    };
                    slowDownSpin();
                }, 1500); 
            } catch (e) {
                clearInterval(shuffleTimer);
                alert(e === "ALREADY_OPENED" ? "이미 추첨하셨습니다!" : "통신 오류가 발생했습니다.");
                window.currentView = null; checkStateAndRender();
            }
        };

        window.renderFinalLotteryView = function(resultType, myRank) {
            window.currentView = 'result';
            let resultCardHTML = '';

            if (resultType === 'SPECIAL_GIFT') {
                resultCardHTML = `
                    <div class="bg-gradient-to-br from-purple-600 to-indigo-700 border-4 border-yellow-400 p-8 rounded-3xl w-full max-w-sm pop-up shadow-[0_0_60px_rgba(234,179,8,0.6)] relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 text-6xl opacity-20">💖</div>
                        <div class="text-6xl mb-4 animate-bounce">🎁</div>
                        <h3 class="text-2xl font-black text-yellow-300 comic-font mb-2 leading-tight">이혜빈 실장님의<br>특별 선물 당첨!</h3>
                        <p class="text-white text-xl font-bold mb-2">🌿 올리브영 3만원권</p>
                        <p class="text-indigo-200 text-xs font-medium">실장님이 따로 준비하신 깜짝 선물입니다!</p>
                    </div>
                `;
            } else if (resultType === 'WIN_LEAVE') {
                resultCardHTML = `
                    <div class="bg-pink-500/20 border-2 border-pink-400 p-8 rounded-3xl w-full max-w-sm pop-up shadow-[0_0_50px_rgba(236,72,153,0.6)]">
                        <div class="text-6xl mb-4 animate-bounce">🏖️</div>
                        <h3 class="text-4xl font-black text-pink-400 comic-font mb-2">반차 당첨!!</h3>
                        <p class="text-white text-sm font-bold">기획자에게 화면을 보여주시고 마음껏 환호하세요!</p>
                    </div>
                `;
            } else {
                resultCardHTML = `
                    <div class="bg-slate-800 border-2 border-slate-600 p-8 rounded-3xl w-full max-w-sm pop-up shadow-xl">
                        <div class="text-6xl mb-4 grayscale opacity-80 shake">💥</div>
                        <h3 class="text-3xl font-black text-slate-400 comic-font mb-2">꽝! 아쉽습니다</h3>
                        <p class="text-slate-500 text-sm font-bold break-keep">행운의 여신이 이번엔 비껴갔습니다.<br>내일도 힘차게 출근해 주세요!</p>
                    </div>
                `;
            }

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in pb-10 w-full">
                    <p class="text-pink-400 font-bold mb-2 comic-font text-lg tracking-widest pop-up">나의 추첨 번호 : [ ${myRank}번 ]</p>
                    <h2 class="text-4xl title-font text-white mb-10 pop-up">최종 결과 발표</h2>
                    <div class="flex flex-col items-center justify-center w-full">${resultCardHTML}</div>
                    <button onclick="window.currentView=null; checkStateAndRender();" class="mt-12 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 px-8 rounded-full border border-slate-600 transition-all text-sm">처음 화면으로</button>
                </div>
            `;
        };

        window.enterAdminMode = function() { if (prompt("비밀번호") === "0000") window.renderAdminScreen(); };
        window.renderAdminScreen = function() {
            window.currentView = 'admin';
            const winNum = window.surpriseData ? window.surpriseData.winningNumber : '?';
            const opened = window.surpriseData ? (window.surpriseData.openedBoxes || {}) : {};
            let listHTML = '';
            for(let i=1; i<=16; i++) {
                if(opened[i]) listHTML += `<div class="flex justify-between bg-slate-800 px-3 py-2 border-b border-slate-700 text-sm"><span class="text-slate-400">${i}번</span> <span class="text-white">${opened[i]}</span></div>`;
            }
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col w-full fade-in pb-10">
                    <div class="flex justify-between items-center mb-6"><h2 class="text-xl title-font text-white">⚙️ 관리자</h2><button onclick="window.currentView=null; checkStateAndRender();" class="text-slate-400 text-sm bg-slate-800 px-3 py-1 rounded-full border border-slate-700">닫기</button></div>
                    <div class="bg-pink-900/30 border border-pink-500/50 p-4 rounded-xl mb-4 text-center"><p class="text-pink-400 font-bold mb-1">당첨 번호 (1등 제외)</p><p class="text-4xl title-font text-white">${winNum} 번</p></div>
                    <div class="bg-slate-900 border border-slate-700 rounded-xl mb-6 overflow-hidden max-h-[40vh] overflow-y-auto no-scrollbar">${listHTML || '<p class="p-3 text-slate-500 text-center">기록 없음</p>'}</div>
                    <button onclick="window.resetSurpriseData()" class="w-full bg-red-500/20 text-red-400 border border-red-500/30 py-4 rounded-xl font-bold hover:bg-red-500 hover:text-white transition-all">🚨 당첨 번호 초기화 & 다시 섞기</button>
                </div>
            `;
        };
        window.resetSurpriseData = async function() {
            if(confirm("기초화할까요?")) {
                const winNum = Math.floor(Math.random() * 15) + 2; 
                await setDoc(surpriseDocRef, { winningNumber: winNum, openedBoxes: {}, lastReset: new Date().getTime() });
                window.currentView = null; checkStateAndRender();
            }
        };
    </script>
</body>
</html>
